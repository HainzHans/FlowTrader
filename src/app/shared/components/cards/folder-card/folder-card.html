<div class="folder-grid">

  <div class="folder-card">
    <div class="folder-tab">
      <span class="tab-text">{{ folderId() }}</span>
    </div>

    <div class="folder-body">
      <div class="folder-header">
        <div class="folder-title-wrapper">
          <i class="pi pi-folder folder-icon"></i>
          <h4 class="folder-title">{{folderLabel()}}</h4>
        </div>
        <button class="icon-btn"><i class="pi pi-ellipsis-v"></i></button>
      </div>

      <div class="folder-content">
        <div class="stat-row">
          <span class="text-secondary">{{ folderPrimaryLabel() }}</span>
          <span class="text-primary font-medium">{{ folderPrimaryCounter() }}</span>
        </div>
        <div class="stat-row">
          <span class="text-secondary">{{ folderSecondaryLabel() }}</span>
          <span class="badge badge--green">{{ folderSecondaryCounter() }}</span>
        </div>
      </div>

      <div class="folder-footer">
        <span class="mono text-tertiary">Zuletzt: {{ folderLastUpdated() }}</span>
      </div>
    </div>
  </div>

</div>
