<div class="modal-backdrop" (click)="backdropClick()">
  <div class="modal" (click)="$event.stopPropagation()" role="dialog">

    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-icon">
          <i class="pi pi-pencil"></i>
        </div>
        <div>
          <h2 class="modal-title">{{ isEdit ? 'Notiz bearbeiten' : 'Neue Notiz' }}</h2>
          <p class="modal-subtitle" *ngIf="categoryName()">
            in <span class="category-name">{{ categoryName() }}</span>
          </p>
        </div>
      </div>
      <button class="close-btn" (click)="onCancel.emit()">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-field">
        <label>Titel <span class="optional">(optional)</span></label>
        <input
          type="text"
          placeholder="z.B. BIAS für KW17, Tagesreflexion..."
          [value]="title()"
          (input)="title.set($any($event.target).value)"
          maxlength="100"
        />
      </div>

      <div class="form-field form-field--grow">
        <label>Inhalt *</label>
        <textarea
          placeholder="Schreibe deine Gedanken, Beobachtungen oder Erkenntnisse..."
          [value]="content()"
          (input)="content.set($any($event.target).value)"
          rows="10"
        ></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="onCancel.emit()">Abbrechen</button>
      <button class="btn-save" (click)="save()" [disabled]="!isValid">
        <i [class]="isEdit ? 'pi pi-check' : 'pi pi-plus'"></i>
        {{ isEdit ? 'Speichern' : 'Notiz erstellen' }}
      </button>
    </div>

  </div>
</div>
