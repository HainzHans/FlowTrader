<div class="rule-item" (click)="closeMenu()">
  <div class="rule-item-left">
    <div class="rule-priority-bar"
         [style.background]="'var(--priority-color-' + rule().priority + ')'">
    </div>
    <div class="rule-content">
      <div class="rule-header">
        <span class="rule-title">{{ rule().title }}</span>
        <app-rule-priority-badge [priority]="rule().priority" />
      </div>
      @if (rule().description) {
        <p class="rule-description">{{ rule().description }}</p>
      }
    </div>
  </div>

  <div class="rule-actions">
    <button class="rule-menu-btn" (click)="toggleMenu($event)" [class.active]="menuOpen()" aria-label="Optionen">
      <i class="pi pi-ellipsis-h"></i>
    </button>

    @if (menuOpen()) {
      <div class="rule-menu" (click)="$event.stopPropagation()">
        <button class="rule-menu-item" (click)="edit()">
          <i class="pi pi-pencil"></i>
          Bearbeiten
        </button>
        <div class="rule-menu-divider"></div>
        <button class="rule-menu-item rule-menu-item--danger" (click)="delete()">
          <i class="pi pi-trash"></i>
          Löschen
        </button>
      </div>
    }
  </div>
</div>
