<div class="modal-backdrop" (click)="backdropClick()">
  <div class="modal" (click)="$event.stopPropagation()" role="dialog" [attr.aria-label]="isEditing ? 'Trade bearbeiten' : 'Neuer Trade'">

    <!-- Header -->
    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-icon" [attr.data-result]="form().result">
          <i [class]="isEditing ? 'pi pi-pencil' : 'pi pi-plus'"></i>
        </div>
        <div>
          <h2 class="modal-title">{{ isEditing ? 'Trade bearbeiten' : 'Neuer Trade' }}</h2>
          <p class="modal-subtitle">{{ isEditing ? 'Passe die Trade-Details an.' : 'Dokumentiere deinen Trade.' }}</p>
        </div>
      </div>
      <button class="close-btn" (click)="onClose.emit()" aria-label="Schließen">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <!-- Section: Basisinfos -->
      <div class="form-section">
        <p class="section-heading">Basisinfos</p>

        <div class="form-row">
          <!-- Symbol -->
          <div class="form-field" [class.has-error]="errors()['symbol']">
            <label>Symbol *</label>
            <input
              type="text"
              placeholder="z.B. BTC/USDT"
              [value]="form().symbol"
              (input)="patch('symbol', $any($event.target).value)"
            />
            <span class="field-error" *ngIf="errors()['symbol']">{{ errors()['symbol'] }}</span>
          </div>

          <!-- Market -->
          <div class="form-field">
            <label>Markt</label>
            <div class="select-wrapper">
              <select [value]="form().market" (change)="patch('market', $any($event.target).value)">
                <option *ngFor="let m of marketOptions" [value]="m">{{ m }}</option>
              </select>
              <i class="pi pi-chevron-down select-arrow"></i>
            </div>
          </div>
        </div>

        <!-- Setup -->
        <div class="form-field" [class.has-error]="errors()['setup']">
          <label>Setup *</label>
          <div class="setup-input-group">
            <input
              type="text"
              placeholder="z.B. Liquiditätszone, Gap & Go ..."
              [value]="form().setup"
              (input)="patch('setup', $any($event.target).value)"
              list="setup-suggestions"
            />
            <datalist id="setup-suggestions">
              <option *ngFor="let s of setupOptions" [value]="s"></option>
            </datalist>
          </div>
          <span class="field-error" *ngIf="errors()['setup']">{{ errors()['setup'] }}</span>
        </div>

        <!-- Datum -->
        <div class="form-field form-field--half">
          <label>Datum</label>
          <input type="date" [value]="form().date" (input)="patch('date', $any($event.target).value)" />
        </div>
      </div>

      <!-- Section: Ergebnis -->
      <div class="form-section">
        <p class="section-heading">Ergebnis</p>

        <div class="result-toggle">
          <button
            class="result-btn"
            [class.active]="form().result === 'win'"
            data-result="win"
            (click)="setResult('win')">
            <i class="pi pi-arrow-up-right"></i>
            Win
          </button>
          <button
            class="result-btn"
            [class.active]="form().result === 'loss'"
            data-result="loss"
            (click)="setResult('loss')">
            <i class="pi pi-arrow-down-right"></i>
            Loss
          </button>
          <button
            class="result-btn"
            [class.active]="form().result === 'breakeven'"
            data-result="be"
            (click)="setResult('breakeven')">
            <i class="pi pi-minus"></i>
            Breakeven
          </button>
        </div>

        <div class="form-row form-row--3">
          <div class="form-field">
            <label>P&amp;L ($)</label>
            <div class="input-prefix-group">
              <span class="input-prefix">$</span>
              <input type="number" step="0.01" [value]="form().pnl" (input)="patch('pnl', +$any($event.target).value)" />
            </div>
          </div>
          <div class="form-field">
            <label>P&amp;L (%)</label>
            <div class="input-prefix-group">
              <span class="input-prefix">%</span>
              <input type="number" step="0.01" [value]="form().pnlPercent" (input)="patch('pnlPercent', +$any($event.target).value)" />
            </div>
          </div>
          <div class="form-field">
            <label>R:R Ratio</label>
            <div class="input-prefix-group">
              <span class="input-prefix">R</span>
              <input type="number" step="0.1" min="0" [value]="form().rr" (input)="patch('rr', +$any($event.target).value)" />
            </div>
          </div>
        </div>
      </div>

      <!-- Section: Chart -->
      <div class="form-section">
        <p class="section-heading">Chart-Bild</p>
        <div class="form-field">
          <label>Bild-URL <span class="label-optional">(optional)</span></label>
          <input type="url" placeholder="https://..." [value]="form().imageUrl" (input)="patch('imageUrl', $any($event.target).value)" />
        </div>
        <!-- Preview -->
        <div class="img-preview" *ngIf="form().imageUrl">
          <img [src]="form().imageUrl" alt="Chart preview" (error)="patch('imageUrl', '')" />
        </div>
      </div>

      <!-- Section: Notizen & Tags -->
      <div class="form-section">
        <p class="section-heading">Notizen &amp; Tags</p>

        <div class="form-field">
          <label>Notizen</label>
          <textarea
            rows="3"
            placeholder="Was lief gut? Was hast du gelernt? Besonderheiten des Setups..."
            [value]="form().notes"
            (input)="patch('notes', $any($event.target).value)"
          ></textarea>
        </div>

        <div class="form-field">
          <label>Tags</label>
          <div class="tag-input-row">
            <input
              type="text"
              placeholder="Tag tippen + Enter"
              [value]="tagInput()"
              (input)="tagInput.set($any($event.target).value)"
              (keydown)="onTagKey($event)"
            />
            <button type="button" class="tag-add-btn" (click)="addTag()">
              <i class="pi pi-plus"></i>
            </button>
          </div>
          <div class="tag-list" *ngIf="form().tags.length">
            <span class="tag-pill" *ngFor="let tag of form().tags">
              #{{ tag }}
              <button (click)="removeTag(tag)" aria-label="Tag entfernen">×</button>
            </span>
          </div>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn btn--ghost-modal" (click)="onClose.emit()">Abbrechen</button>
      <button class="btn btn--save" (click)="submit()">
        <i [class]="isEditing ? 'pi pi-check' : 'pi pi-plus'"></i>
        {{ isEditing ? 'Änderungen speichern' : 'Trade hinzufügen' }}
      </button>
    </div>

  </div>
</div>
