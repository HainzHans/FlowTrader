<div class="modal-backdrop" (click)="backdropClick()">
  <div class="modal" (click)="$event.stopPropagation()" role="dialog">

    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-icon"
             [style.background]="color() + '22'"
             [style.border-color]="color() + '55'">
          <i class="pi {{ icon() }}" [style.color]="color()"></i>
        </div>
        <div>
          <h2 class="modal-title">{{ isEdit ? 'Kategorie bearbeiten' : 'Neue Kategorie' }}</h2>
          <p class="modal-subtitle">Organisiere deine Notizen</p>
        </div>
      </div>
      <button class="close-btn" (click)="onCancel.emit()">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <div class="modal-body">

      <div class="form-field">
        <label>Name *</label>
        <input
          type="text"
          placeholder="z.B. NQ Analyse, Setups, Tagesreflexion..."
          [value]="label()"
          (input)="label.set($any($event.target).value)"
          maxlength="40"
        />
      </div>

      <div class="form-field">
        <label>Farbe</label>
        <div class="color-grid">
          @for (c of colors; track c.value) {
            <button
              class="color-swatch"
              [class.active]="color() === c.value"
              [style.background]="c.value"
              [attr.title]="c.label"
              (click)="color.set(c.value)"
              type="button">
              @if (color() === c.value) {
                <i class="pi pi-check"></i>
              }
            </button>
          }
        </div>
      </div>

      <div class="form-field">
        <label>Icon</label>
        <div class="icon-grid">
          @for (ic of icons; track ic) {
            <button
              class="icon-btn"
              [class.active]="icon() === ic"
              [style.--active-color]="color()"
              (click)="icon.set(ic)"
              type="button">
              <i class="pi {{ ic }}"></i>
            </button>
          }
        </div>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="onCancel.emit()">Abbrechen</button>
      <button class="btn-save" (click)="save()" [disabled]="!isValid">
        {{ isEdit ? 'Speichern' : 'Kategorie erstellen' }}
      </button>
    </div>

  </div>
</div>
