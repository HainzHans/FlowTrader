<div class="empty-state">
  <div class="empty-icon">
    <i class="pi {{ icon() }}"></i>
  </div>
  <p class="empty-title">{{ title() }}</p>
  @if (message()) {
    <p class="empty-message">{{ message() }}</p>
  }
  @if (cta()) {
    <button class="btn btn--secondary btn--sm" (click)="onCta.emit()">
      {{ cta() }}
    </button>
  }
</div>
