<app-section-header
  [title]="'Trade Journal'"
  [subTitle]="'Dokumentiere jeden Trade. Lerne aus jedem Setup.'"
  [primaryButtonIcon]="'pi-plus'"
  [primaryButtonText]="'Trade hinzufügen'"
  [iconButtonIcon]="'pi-file-import'"
></app-section-header>
<div class="section-content">
  @for (trade of trades(); track trade.id) {
    <app-user-trade-card
      [trade]="trade"
    ></app-user-trade-card>
  }
</div>
